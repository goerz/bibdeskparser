name: Tests

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  run_tests:
    name: ${{ matrix.title || matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: Linux (Codestyle and Tests)
            os: ubuntu-latest
            codestyle: true
            coverage: true
          - title: Windows (Tests)
            os: windows-latest
            coverage: true
          - title: MacOS (Tests)
            os: macos-latest
            coverage: true
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Check code style
        if: matrix.codestyle == true
        run: make black-check isort-check check-changelog

      - name: Run tests
        run: make test

      - name: Convert coverage data to xml
        if: matrix.coverage == true
        run: make coverage-xml

      - uses: codecov/codecov-action@v7
        if: matrix.coverage == true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: goerz/bibdeskparser
          verbose: false

  check_changelog_pr:
    name: Changelog references PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check that added changelog entries reference this PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          added=$(git diff "$BASE"...HEAD -- CHANGELOG.md \
                  | grep -E '^\+\* ' || true)
          if [ -z "$added" ]; then
            echo "No changelog bullets added; nothing to check."
            exit 0
          fi
          fail=0
          if ! echo "$added" | grep -qF "[#$PR]"; then
            echo "::error file=CHANGELOG.md::Added changelog entries must reference this PR as [[#$PR]]"
            fail=1
          fi
          issues=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" \
                   --json closingIssuesReferences \
                   -q '.closingIssuesReferences[].number')
          for issue in $issues; do
            if ! echo "$added" | grep -qF "[#$issue]"; then
              echo "::error file=CHANGELOG.md::Changelog entry must also reference closed issue [[#$issue]]"
              fail=1
            fi
          done
          exit $fail
